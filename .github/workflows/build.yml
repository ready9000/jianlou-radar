name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
    
    - name: Install dependencies
      working-directory: .
      run: |
        npm install
        npm install -g cordova
    
    - name: Add Android platform
      working-directory: .
      run: cordova platform add android
    
    - name: Build APK
      working-directory: .
      run: cordova build android
    
    - name: Find APK location
      run: |
        echo "Searching for APK files..."
        find cordova-app/platforms/android -name "*.apk" -type f 2>/dev/null || echo "No APK files found"
        echo "Listing build directories..."
        ls -la cordova-app/platforms/android/app/build/outputs/apk/debug/ 2>/dev/null || echo "Debug APK directory not found"
        ls -la cordova-app/platforms/android/build/outputs/apk/debug/ 2>/dev/null || echo "Alternative APK directory not found"
    
    - name: Find and Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: jianlou-radar-apk
        path: |
          cordova-app/platforms/android/app/build/outputs/apk/debug/*.apk
          cordova-app/platforms/android/build/outputs/apk/debug/*.apk
        if-no-files-found: warn
